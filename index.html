<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Maze Explorer Pro — Liquid Glass</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f5f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --liquid-bg: linear-gradient(145deg, #e2e8f0 0%, #cbd5e1 100%);
            --glass: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #475569;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background: var(--liquid-bg);
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 12px;
            gap: 10px;
            overflow: hidden;
        }

        header {
            padding: 10px 16px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02), inset 0 1px 1px white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-zone { display: flex; align-items: center; gap: 8px; }
        h1 { font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, #007aff, #5856d6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-history-trigger {
            background: rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0,0,0,0.02);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
        }

        .stats { display: flex; gap: 10px; font-size: 0.78rem; color: var(--text-muted); }
        .stats b { color: var(--text-main); font-weight: 600; }

        main { display: flex; align-items: center; justify-content: center; min-height: 0; width: 100%; }

        .canvas-container {
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { border-radius: 18px; background: rgba(255, 255, 255, 0.9); max-width: 100%; max-height: 100%; }

        .bottom-dock {
            padding: 12px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(35px) saturate(190%);
            -webkit-backdrop-filter: blur(35px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04), inset 0 1px 1px rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dock-row { display: flex; gap: 8px; align-items: center; }

        .mode-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            background: rgba(0,0,0,0.03);
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .btn-video-download {
            background: linear-gradient(135deg, #34c759 0%, #28a745 100%);
            color: white; border: none; padding: 6px 14px; border-radius: 10px;
            font-size: 0.75rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3); display: none;
        }

        .segmented-control { display: flex; background: rgba(0, 0, 0, 0.05); padding: 2px; border-radius: 14px; flex: 1; }
        .segmented-control button {
            flex: 1; border: none; background: transparent; padding: 8px 2px;
            font-size: 0.8rem; font-weight: 600; color: var(--text-muted); border-radius: 12px; cursor: pointer;
        }
        .segmented-control button.active { background: #ffffff; color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        select {
            appearance: none; background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(0,0,0,0.03);
            padding: 8px 12px; border-radius: 14px; font-size: 0.8rem; font-weight: 600; color: var(--text-main); flex: 1.2; text-align: center; outline: none;
        }

        button.action-btn { background: rgba(255, 255, 255, 0.6); border: 1px solid rgba(0,0,0,0.01); padding: 9px; border-radius: 14px; font-size: 0.78rem; font-weight: 600; color: var(--text-main); cursor: pointer; flex: 1; }

        button.primary-launch {
            background: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
            color: white; border: none; padding: 12px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; cursor: pointer; box-shadow: 0 6px 20px rgba(0, 122, 255, 0.25); transition: all 0.2s;
        }
        button.primary-launch:active { transform: scale(0.97); }
        button:disabled, select:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        /* Окна истории */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: rgba(255, 255, 255, 0.75); border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-radius: 24px; width: 100%; max-width: 400px; max-height: 70vh; display: flex; flex-direction: column; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--ios-red); font-weight: bold;}
        .history-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .history-item { background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.03); padding: 10px; border-radius: 14px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .history-item-info span { display: block; color: var(--text-muted); font-size: 0.7rem; }
        .btn-replay { background: var(--ios-blue); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }

        @media (min-width: 768px) { body { padding: 30px; gap: 20px; } .bottom-dock { width: 500px; margin: 0 auto; } .canvas-container { max-width: 500px; } }
    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <h1>AI Explorer</h1>
            <button id="btnHistory" class="btn-history-trigger">⏱ История</button>
        </div>
        <div class="stats">
            <span>Изучено: <b id="stat-visited">0</b></span>
            <span>Путь: <b id="stat-path">0</b></span>
        </div>
    </header>

    <main>
        <div class="canvas-container">
            <canvas id="mazeCanvas"></canvas>
        </div>
    </main>

    <div class="bottom-dock">
        <div class="mode-description">
            <span id="modeDesc">🧠 ИИ-Навигатор: оценивает расстояние до финиша по воздуху и сразу выбирает оптимальный вектор движения. Удерживайте и тащите точки СТАРТ/ФИНИШ для переноса.</span>
            <button id="btnSaveVideo" class="btn-video-download">📹 Скачать видео прохождения</button>
        </div>

        <div class="dock-row">
            <div class="segmented-control">
                <button id="toolWall" class="active">Стена</button>
                <button id="toolErase">Ластик</button>
            </div>
            
            <select id="algoSelector">
                <option value="astar">🧠 ИИ-Навигатор (A*)</option>
                <option value="dijkstra">🔍 Мудрый ИИ (Dijkstra)</option>
                <option value="bfs">🌊 ИИ-Волна (BFS)</option>
                <option value="dfs">🌀 ИИ-Следопыт (DFS)</option>
            </select>
        </div>

        <div class="dock-row">
            <div class="segmented-control" style="flex: 1.1;">
                <button id="spdSlow">🐢</button>
                <button id="spdNormal" class="active">⚡</button>
                <button id="spdFast">🚀</button>
            </div>
            
            <button id="btnGenerate" class="action-btn">Создать</button>
            <button id="btnClear" class="action-btn">Очистить</button>
        </div>

        <button id="btnLaunch" class="primary-launch">ЗАПУСТИТЬ МЫШЛЕНИЕ ИИ</button>
    </div>

    <div id="historyOverlay" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Предыдущие запуски</h3>
                <button class="modal-close" id="btnCloseHistory">✕</button>
            </div>
            <div class="history-list" id="historyListContainer"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 21, ROWS = 21; 
        let cellSize = 0, grid = [], isDrawing = false, modeDrawWall = true, isRunning = false;
        
        // Переменные для перетаскивания точек
        let isDraggingStart = false;
        let isDraggingEnd = false;

        let aiDelay = 15; 
        let startNode = {x: 1, y: 1};
        let endNode = {x: 19, y: 19};
        let visitedArr = [], frontierArr = [], finalPath = [];
        let mediaRecorder, recordedChunks = [];

        const descriptions = {
            astar: "🧠 ИИ-Навигатор: оценивает расстояние до финиша по воздуху и сразу выбирает оптимальный вектор движения.",
            dijkstra: "🔍 Мудрый ИИ: методично проверяет абсолютно все варианты вокруг себя, гарантируя идеальный маршрут.",
            bfs: "🌊 ИИ-Волна: симулирует поток воды, заполняющий лабиринт во все стороны одновременно.",
            dfs: "🌀 ИИ-Следопыт: выбирает случайную ветку и бежит по ней до упора. Если там тупик — возвращается."
        };

        function saveConfig() {
            localStorage.setItem('maze_ai_config', JSON.stringify({
                algo: document.getElementById('algoSelector').value,
                delay: aiDelay,
                tool: modeDrawWall,
                start: startNode,
                end: endNode
            }));
        }

        function loadConfig() {
            const saved = localStorage.getItem('maze_ai_config');
            if (saved) {
                const config = JSON.parse(saved);
                document.getElementById('algoSelector').value = config.algo;
                document.getElementById('modeDesc').innerText = descriptions[config.algo] + " Удерживайте и тащите точки СТАРТ/ФИНИШ для переноса.";
                aiDelay = config.delay;
                modeDrawWall = config.tool;
                if(config.start) startNode = config.start;
                if(config.end) endNode = config.end;
                
                document.getElementById('spdSlow').classList.toggle('active', aiDelay === 60);
                document.getElementById('spdNormal').classList.toggle('active', aiDelay === 15);
                document.getElementById('spdFast').classList.toggle('active', aiDelay === 1);
                document.getElementById('toolWall').classList.toggle('active', modeDrawWall);
                document.getElementById('toolErase').classList.toggle('active', !modeDrawWall);
            }
        }

        function init() {
            grid = Array(COLS).fill().map(() => Array(ROWS).fill(0));
            resize();
            setupInteractions();
            setupSpeedControls();
            setupHistoryUI();
            loadConfig();
        }

        function resize() {
            const container = canvas.parentElement;
            const sizeValue = Math.min(container.clientWidth, container.clientHeight) - 12;
            canvas.width = canvas.height = sizeValue;
            cellSize = sizeValue / COLS;
            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#334155';
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (grid[x][y] === 1) {
                        ctx.beginPath();
                        ctx.roundRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2, cellSize * 0.2);
                        ctx.fill();
                    }
                }
            }

            ctx.fillStyle = 'rgba(147, 51, 234, 0.12)';
            for (let node of visitedArr) ctx.fillRect(node.x * cellSize, node.y * cellSize, cellSize, cellSize);

            ctx.fillStyle = 'rgba(0, 122, 255, 0.3)';
            for (let node of frontierArr) ctx.fillRect(node.x * cellSize, node.y * cellSize, cellSize, cellSize);

            if (finalPath.length > 0) {
                ctx.strokeStyle = '#34c759'; ctx.lineWidth = cellSize * 0.3; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.beginPath();
                ctx.moveTo(startNode.x * cellSize + cellSize / 2, startNode.y * cellSize + cellSize / 2);
                for (let node of finalPath) ctx.lineTo(node.x * cellSize + cellSize / 2, node.y * cellSize + cellSize / 2);
                ctx.stroke();
            }

            ctx.fillStyle = '#007aff'; ctx.beginPath(); ctx.arc(startNode.x * cellSize + cellSize / 2, startNode.y * cellSize + cellSize / 2, cellSize * 0.35, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#ff3b30'; ctx.beginPath(); ctx.arc(endNode.x * cellSize + cellSize / 2, endNode.y * cellSize + cellSize / 2, cellSize * 0.35, 0, Math.PI * 2); ctx.fill();
        }

        function setupInteractions() {
            function getCellCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: Math.floor((clientX - rect.left) / cellSize),
                    y: Math.floor((clientY - rect.top) / cellSize)
                };
            }

            function pointerDown(e) {
                if (isRunning) return;
                const cell = getCellCoords(e);
                if (cell.x >= 0 && cell.x < COLS && cell.y >= 0 && cell.y < ROWS) {
                    if (cell.x === startNode.x && cell.y === startNode.y) {
                        isDraggingStart = true;
                    } else if (cell.x === endNode.x && cell.y === endNode.y) {
                        isDraggingEnd = true;
                    } else {
                        isDrawing = true;
                        grid[cell.x][cell.y] = modeDrawWall ? 1 : 0;
                    }
                    resetAIStats();
                }
            }

            function pointerMove(e) {
                if (isRunning) return;
                if (!isDrawing && !isDraggingStart && !isDraggingEnd) return;
                const cell = getCellCoords(e);
                
                if (cell.x >= 0 && cell.x < COLS && cell.y >= 0 && cell.y < ROWS) {
                    if (isDraggingStart) {
                        if (cell.x !== endNode.x || cell.y !== endNode.y) {
                            startNode.x = cell.x; startNode.y = cell.y;
                            grid[cell.x][cell.y] = 0; // Стираем стену под точкой
                        }
                    } else if (isDraggingEnd) {
                        if (cell.x !== startNode.x || cell.y !== startNode.y) {
                            endNode.x = cell.x; endNode.y = cell.y;
                            grid[cell.x][cell.y] = 0; // Стираем стену под точкой
                        }
                    } else if (isDrawing) {
                        if ((cell.x === startNode.x && cell.y === startNode.y) || (cell.x === endNode.x && cell.y === endNode.y)) return;
                        grid[cell.x][cell.y] = modeDrawWall ? 1 : 0;
                    }
                    resetAIStats();
                }
            }

            function pointerUp() {
                if(isDraggingStart || isDraggingEnd) saveConfig();
                isDrawing = isDraggingStart = isDraggingEnd = false;
            }

            canvas.addEventListener('mousedown', pointerDown);
            canvas.addEventListener('mousemove', pointerMove);
            window.addEventListener('mouseup', pointerUp);

            canvas.addEventListener('touchstart', (e) => { pointerDown(e); e.preventDefault(); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { pointerMove(e); e.preventDefault(); }, {passive: false});
            window.addEventListener('touchend', pointerUp);

            document.getElementById('toolWall').addEventListener('click', function() {
                modeDrawWall = true; this.classList.add('active'); document.getElementById('toolErase').classList.remove('active'); saveConfig();
            });
            document.getElementById('toolErase').addEventListener('click', function() {
                modeDrawWall = false; this.classList.add('active'); document.getElementById('toolWall').classList.remove('active'); saveConfig();
            });
            document.getElementById('algoSelector').addEventListener('change', saveConfig);
            document.getElementById('btnClear').addEventListener('click', () => {
                if(isRunning) return;
                grid = Array(COLS).fill().map(() => Array(ROWS).fill(0)); resetAIStats();
            });
            document.getElementById('btnGenerate').addEventListener('click', generateMaze);
            document.getElementById('btnLaunch').addEventListener('click', launchAI);
        }

        function setupSpeedControls() {
            const btnSlow = document.getElementById('spdSlow');
            const btnNormal = document.getElementById('spdNormal');
            const btnFast = document.getElementById('spdFast');
            function clearActive() { btnSlow.classList.remove('active'); btnNormal.classList.remove('active'); btnFast.classList.remove('active'); }
            btnSlow.addEventListener('click', () => { clearActive(); btnSlow.classList.add('active'); aiDelay = 60; saveConfig(); });
            btnNormal.addEventListener('click', () => { clearActive(); btnNormal.classList.add('active'); aiDelay = 15; saveConfig(); });
            btnFast.addEventListener('click', () => { clearActive(); btnFast.classList.add('active'); aiDelay = 1; saveConfig(); });
        }

        function resetAIStats() {
            visitedArr = []; frontierArr = []; finalPath = [];
            document.getElementById('stat-visited').innerText = '0';
            document.getElementById('stat-path').innerText = '0';
            document.getElementById('btnSaveVideo').style.display = 'none';
            render();
        }

        function generateMaze() {
            if (isRunning) return;
            resetAIStats();
            for (let x = 0; x < COLS; x++) for (let y = 0; y < ROWS; y++) grid[x][y] = 1;
            let stack = []; let current = {x: 1, y: 1}; grid[current.x][current.y] = 0;

            function getNeighbors(c) {
                let n = []; let dirs = [{x:0, y:-2}, {x:0, y:2}, {x:-2, y:0}, {x:2, y:0}];
                for(let d of dirs) {
                    let nx = c.x + d.x, ny = c.y + d.y;
                    if(nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && grid[nx][ny] === 1) {
                        n.push({x: nx, y: ny, wx: c.x + d.x/2, wy: c.y + d.y/2});
                    }
                }
                return n;
            }

            while (true) {
                let neighbors = getNeighbors(current);
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    grid[next.wx][next.wy] = 0; grid[next.x][next.y] = 0;
                    stack.push(current); current = next;
                } else if (stack.length > 0) { current = stack.pop(); } else { break; }
            }
            grid[startNode.x][startNode.y] = 0; grid[endNode.x][endNode.y] = 0;
            render();
        }

        function startRecording() {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const downloadBtn = document.getElementById('btnSaveVideo');
                downloadBtn.style.display = 'block';
                downloadBtn.onclick = () => {
                    const a = document.createElement('a'); a.href = videoURL; a.download = `ai-run-${Date.now()}.webm`; a.click();
                };
            };
            mediaRecorder.start();
        }

        function stopRecording() { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }

        function pushToHistory(algoName, checkedNodes, routeLen) {
            let list = JSON.parse(localStorage.getItem('maze_history_list') || '[]');
            list.unshift({
                id: Date.now(),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                algo: algoName, checked: checkedNodes, route: routeLen,
                gridState: JSON.parse(JSON.stringify(grid)), start: {...startNode}, end: {...endNode}
            });
            if(list.length > 15) list.pop();
            localStorage.setItem('maze_history_list', JSON.stringify(list));
        }

        function setupHistoryUI() {
            const overlay = document.getElementById('historyOverlay');
            document.getElementById('btnHistory').onclick = () => { buildHistoryDOM(); overlay.style.display = 'flex'; };
            document.getElementById('btnCloseHistory').onclick = () => overlay.style.display = 'none';
        }

        function buildHistoryDOM() {
            const container = document.getElementById('historyListContainer'); container.innerHTML = '';
            const list = JSON.parse(localStorage.getItem('maze_history_list') || '[]');
            if(list.length === 0) { container.innerHTML = '<div style="text-align:center; font-size:0.85rem; color:var(--text-muted); padding:20px;">История пуста</div>'; return; }
            
            list.forEach(item => {
                const el = document.createElement('div'); el.className = 'history-item';
                el.innerHTML = `<div class="history-item-info"><strong>${item.algo} [${item.time}]</strong><span>Изучено: ${item.checked} | Путь: ${item.route}</span></div><button class="btn-replay" data-id="${item.id}">Открыть</button>`;
                container.appendChild(el);
            });

            container.querySelectorAll('.btn-replay').forEach(btn => {
                btn.onclick = (e) => {
                    const targetId = parseInt(e.target.getAttribute('data-id'));
                    const sel = list.find(x => x.id === targetId);
                    if(sel) {
                        grid = JSON.parse(JSON.stringify(sel.gridState));
                        if(sel.start) startNode = sel.start; if(sel.end) endNode = sel.end;
                        resetAIStats(); document.getElementById('historyOverlay').style.display = 'none';
                    }
                };
            });
        }

        function getValidNeighbors(node) {
            let res = []; let dirs = [{x:0,y:-1}, {x:1,y:0}, {x:0,y:1}, {x:-1,y:0}];
            for(let d of dirs) {
                let nx = node.x + d.x, ny = node.y + d.y;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] !== 1) res.push({x: nx, y: ny});
            }
            return res;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));
        function setUIDisabled(state) {
            isRunning = state;
            document.getElementById('btnLaunch').disabled = state; document.getElementById('btnGenerate').disabled = state;
            document.getElementById('btnClear').disabled = state; document.getElementById('algoSelector').disabled = state;
        }

        async function launchAI() {
            if (isRunning) return;
            setUIDisabled(true); resetAIStats(); startRecording();
            const algo = document.getElementById('algoSelector').value;
            const selectEl = document.getElementById('algoSelector');
            const currentAlgoText = selectEl.options[selectEl.selectedIndex].text.split(' ')[1];

            if (algo === 'astar') await solveAStar(false);
            else if (algo === 'dijkstra') await solveAStar(true);
            else if (algo === 'bfs') await solveBFS();
            else if (algo === 'dfs') await solveDFS();

            stopRecording();
            pushToHistory(currentAlgoText, visitedArr.length, finalPath.length);
            setUIDisabled(false);
        }

        function tracePath(endInstance) {
            let curr = endInstance;
            while(curr !== null) { finalPath.unshift(curr); curr = curr.parent; }
            document.getElementById('stat-path').innerText = finalPath.length; render();
        }

        async function solveAStar(isDijkstra) {
            let openSet = [{...startNode, g: 0, f: 0, parent: null}]; let closedSet = new Set();
            let h = (n) => isDijkstra ? 0 : Math.abs(n.x - endNode.x) + Math.abs(n.y - endNode.y);
            openSet[0].f = h(startNode);

            while(openSet.length > 0) {
                openSet.sort((a,b) => a.f - b.f); let current = openSet.shift();
                if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }
                closedSet.add(`${current.x},${current.y}`); visitedArr.push(current);

                for(let neighbor of getValidNeighbors(current)) {
                    if(closedSet.has(`${neighbor.x},${neighbor.y}`)) continue;
                    let tentG = current.g + 1; let existing = openSet.find(o => o.x === neighbor.x && o.y === neighbor.y);
                    if(!existing) openSet.push({x: neighbor.x, y: neighbor.y, g: tentG, f: tentG + h(neighbor), parent: current});
                    else if(tentG < existing.g) { existing.g = tentG; existing.f = tentG + h(existing); existing.parent = current; }
                }
                frontierArr = openSet.map(o => ({x: o.x, y: o.y})); document.getElementById('stat-visited').innerText = visitedArr.length; render(); await sleep(aiDelay);
            }
        }

        async function solveBFS() {
            let queue = [{...startNode, parent: null}]; let visited = new Set([`${startNode.x},${startNode.y}`]);
            while(queue.length > 0) {
                let current = queue.shift(); if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }
                visitedArr.push(current);
                for(let neighbor of getValidNeighbors(current)) {
                    let key = `${neighbor.x},${neighbor.y}`;
                    if(!visited.has(key)) { visited.add(key); queue.push({...neighbor, parent: current}); }
                }
                frontierArr = [...queue]; document.getElementById('stat-visited').innerText = visitedArr.length; render(); await sleep(aiDelay);
            }
        }

        async function solveDFS() {
            let stack = [{...startNode, parent: null}]; let visited = new Set();
            while(stack.length > 0) {
                let current = stack.pop(); let key = `${current.x},${current.y}`;
                if(visited.has(key)) continue; visited.add(key); visitedArr.push(current);
                if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }
                for(let neighbor of getValidNeighbors(current)) { if(!visited.has(`${neighbor.x},${neighbor.y}`)) stack.push({...neighbor, parent: current}); }
                frontierArr = [...stack]; document.getElementById('stat-visited').innerText = visitedArr.length; render(); await sleep(aiDelay);
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', init);
    </script>
</body>

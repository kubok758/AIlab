<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Maze Explorer Pro — Liquid Glass</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1f5f9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <style>
        :root {
            --liquid-bg: linear-gradient(145deg, #e2e8f0 0%, #cbd5e1 100%);
            --glass: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #0f172a;
            --text-muted: #475569;
            --ios-blue: #007aff;
            --ios-green: #34c759;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background: var(--liquid-bg);
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 12px;
            gap: 10px;
            overflow: hidden;
        }

        /* Верхнее табло */
        header {
            padding: 10px 16px;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.02), inset 0 1px 1px white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .stats b { color: var(--text-main); font-weight: 600; }

        /* Игровая зона */
        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            width: 100%;
        }

        .canvas-container {
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.9);
            max-width: 100%;
            max-height: 100%;
        }

        /* Нижний Док управления Liquid Glass */
        .bottom-dock {
            padding: 12px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(35px) saturate(190%);
            -webkit-backdrop-filter: blur(35px) saturate(190%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04), inset 0 1px 1px rgba(255,255,255,0.8);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dock-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mode-description {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            background: rgba(0,0,0,0.03);
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 500;
        }

        /* Капсульные переключатели (iOS-стайл) */
        .segmented-control {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px;
            border-radius: 14px;
            flex: 1;
        }

        .segmented-control button {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 2px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .segmented-control button.active {
            background: #ffffff;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        select {
            appearance: none;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0,0,0,0.03);
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
            flex: 1.2;
            text-align: center;
            outline: none;
        }

        button.action-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0,0,0,0.01);
            padding: 9px;
            border-radius: 14px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            flex: 1;
            transition: transform 0.1s;
        }

        button.action-btn:active { transform: scale(0.97); }

        /* Главная кнопка запуска */
        button.primary-launch {
            background: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.25);
            transition: all 0.2s;
        }

        button.primary-launch:active { transform: scale(0.97); filter: brightness(1.1); }
        button:disabled, select:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

        @media (min-width: 768px) {
            body { padding: 30px; gap: 20px; }
            .bottom-dock { width: 500px; margin: 0 auto; }
            .canvas-container { max-width: 500px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Explorer</h1>
        <div class="stats">
            <span>Изучено: <b id="stat-visited">0</b></span>
            <span>Путь: <b id="stat-path">0</b></span>
        </div>
    </header>

    <main>
        <div class="canvas-container">
            <canvas id="mazeCanvas"></canvas>
        </div>
    </main>

    <div class="bottom-dock">
        <div class="mode-description" id="modeDesc">
            🧠 ИИ-Навигатор: оценивает расстояние до финиша по воздуху и сразу выбирает оптимальный вектор движения.
        </div>

        <div class="dock-row">
            <div class="segmented-control">
                <button id="toolWall" class="active">Стена</button>
                <button id="toolErase">Ластик</button>
            </div>
            
            <select id="algoSelector">
                <option value="astar">🧠 ИИ-Навигатор (A*)</option>
                <option value="dijkstra">🔍 Мудрый ИИ (Dijkstra)</option>
                <option value="bfs">🌊 ИИ-Волна (BFS)</option>
                <option value="dfs">🌀 ИИ-Следопыт (DFS)</option>
            </select>
        </div>

        <div class="dock-row">
            <div class="segmented-control" style="flex: 1.1;">
                <button id="spdSlow">🐢</button>
                <button id="spdNormal" class="active">⚡</button>
                <button id="spdFast">🚀</button>
            </div>
            
            <button id="btnGenerate" class="action-btn">Создать</button>
            <button id="btnClear" class="action-btn">Очистить</button>
        </div>

        <button id="btnLaunch" class="primary-launch">ЗАПУСТИТЬ МЫШЛЕНИЕ ИИ</button>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const COLS = 21, ROWS = 21; 
        let cellSize = 0, grid = [], isDrawing = false, modeDrawWall = true, isRunning = false;
        
        // Тайм-аут шага ИИ в миллисекундах (по умолчанию Нормально = 15мс)
        let aiDelay = 15; 

        const startNode = {x: 1, y: 1};
        const endNode = {x: 19, y: 19};
        let visitedArr = [], frontierArr = [], finalPath = [];

        const descriptions = {
            astar: "🧠 ИИ-Навигатор: оценивает расстояние до финиша по воздуху и сразу выбирает оптимальный вектор движения.",
            dijkstra: "🔍 Мудрый ИИ: методично проверяет абсолютно все варианты вокруг себя, гарантируя идеальный маршрут.",
            bfs: "🌊 ИИ-Волна: симулирует поток воды, заполняющий лабиринт во все стороны одновременно.",
            dfs: "🌀 ИИ-Следопыт: выбирает случайную ветку и бежит по ней до упора. Если там тупик — возвращается."
        };

        document.getElementById('algoSelector').addEventListener('change', function(e) {
            document.getElementById('modeDesc').innerText = descriptions[e.target.value];
        });

        function init() {
            grid = Array(COLS).fill().map(() => Array(ROWS).fill(0));
            resize();
            setupInteractions();
            setupSpeedControls();
        }

        function resize() {
            const container = canvas.parentElement;
            const sizeValue = Math.min(container.clientWidth, container.clientHeight) - 12;
            canvas.width = canvas.height = sizeValue;
            cellSize = sizeValue / COLS;
            render();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Стены
            ctx.fillStyle = '#334155';
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (grid[x][y] === 1) {
                        ctx.beginPath();
                        ctx.roundRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2, cellSize * 0.2);
                        ctx.fill();
                    }
                }
            }

            // Просмотренные ячейки
            ctx.fillStyle = 'rgba(147, 51, 234, 0.12)';
            for (let node of visitedArr) {
                ctx.fillRect(node.x * cellSize, node.y * cellSize, cellSize, cellSize);
            }

            // Фронтир мышления
            ctx.fillStyle = 'rgba(0, 122, 255, 0.3)';
            for (let node of frontierArr) {
                ctx.fillRect(node.x * cellSize, node.y * cellSize, cellSize, cellSize);
            }

            // Построенный путь
            if (finalPath.length > 0) {
                ctx.strokeStyle = '#34c759';
                ctx.lineWidth = cellSize * 0.3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(startNode.x * cellSize + cellSize / 2, startNode.y * cellSize + cellSize / 2);
                for (let node of finalPath) {
                    ctx.lineTo(node.x * cellSize + cellSize / 2, node.y * cellSize + cellSize / 2);
                }
                ctx.stroke();
            }

            // Точки старта и финиша
            ctx.fillStyle = '#007aff';
            ctx.beginPath(); ctx.arc(startNode.x * cellSize + cellSize / 2, startNode.y * cellSize + cellSize / 2, cellSize * 0.3, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#ff3b30';
            ctx.beginPath(); ctx.arc(endNode.x * cellSize + cellSize / 2, endNode.y * cellSize + cellSize / 2, cellSize * 0.3, 0, Math.PI * 2); ctx.fill();
        }

        function setupInteractions() {
            function pointerAction(e) {
                if (isRunning) return;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = Math.floor((clientX - rect.left) / cellSize);
                const y = Math.floor((clientY - rect.top) / cellSize);

                if (x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                    if ((x === startNode.x && y === startNode.y) || (x === endNode.x && y === endNode.y)) return;
                    grid[x][y] = modeDrawWall ? 1 : 0;
                    resetAIStats();
                }
            }

            canvas.addEventListener('mousedown', (e) => { isDrawing = true; pointerAction(e); });
            canvas.addEventListener('mousemove', (e) => { if (isDrawing) pointerAction(e); });
            window.addEventListener('mouseup', () => isDrawing = false);

            canvas.addEventListener('touchstart', (e) => { isDrawing = true; pointerAction(e); e.preventDefault(); }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { if (isDrawing) pointerAction(e); e.preventDefault(); }, {passive: false});
            window.addEventListener('touchend', () => isDrawing = false);

            document.getElementById('toolWall').addEventListener('click', function() {
                modeDrawWall = true; this.classList.add('active'); document.getElementById('toolErase').classList.remove('active');
            });
            document.getElementById('toolErase').addEventListener('click', function() {
                modeDrawWall = false; this.classList.add('active'); document.getElementById('toolWall').classList.remove('active');
            });

            document.getElementById('btnClear').addEventListener('click', () => {
                if(isRunning) return;
                grid = Array(COLS).fill().map(() => Array(ROWS).fill(0));
                resetAIStats();
            });

            document.getElementById('btnGenerate').addEventListener('click', generateMaze);
            document.getElementById('btnLaunch').addEventListener('click', launchAI);
        }

        // Логика управления скоростью
        function setupSpeedControls() {
            const btnSlow = document.getElementById('spdSlow');
            const btnNormal = document.getElementById('spdNormal');
            const btnFast = document.getElementById('spdFast');

            function clearActive() {
                btnSlow.classList.remove('active');
                btnNormal.classList.remove('active');
                btnFast.classList.remove('active');
            }

            btnSlow.addEventListener('click', () => { clearActive(); btnSlow.classList.add('active'); aiDelay = 60; });
            btnNormal.addEventListener('click', () => { clearActive(); btnNormal.classList.add('active'); aiDelay = 15; });
            btnFast.addEventListener('click', () => { clearActive(); btnFast.classList.add('active'); aiDelay = 1; }); // Почти моментально
        }

        function resetAIStats() {
            visitedArr = []; frontierArr = []; finalPath = [];
            document.getElementById('stat-visited').innerText = '0';
            document.getElementById('stat-path').innerText = '0';
            render();
        }

        function generateMaze() {
            if (isRunning) return;
            resetAIStats();
            for (let x = 0; x < COLS; x++) for (let y = 0; y < ROWS; y++) grid[x][y] = 1;

            let stack = [];
            let current = {x: 1, y: 1};
            grid[current.x][current.y] = 0;

            function getNeighbors(c) {
                let n = [];
                let dirs = [{x:0, y:-2}, {x:0, y:2}, {x:-2, y:0}, {x:2, y:0}];
                for(let d of dirs) {
                    let nx = c.x + d.x, ny = c.y + d.y;
                    if(nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && grid[nx][ny] === 1) {
                        n.push({x: nx, y: ny, wx: c.x + d.x/2, wy: c.y + d.y/2});
                    }
                }
                return n;
            }

            while (true) {
                let neighbors = getNeighbors(current);
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    grid[next.wx][next.wy] = 0;
                    grid[next.x][next.y] = 0;
                    stack.push(current);
                    current = next;
                } else if (stack.length > 0) {
                    current = stack.pop();
                } else {
                    break;
                }
            }
            render();
        }

        function getValidNeighbors(node) {
            let res = [];
            let dirs = [{x:0,y:-1}, {x:1,y:0}, {x:0,y:1}, {x:-1,y:0}];
            for(let d of dirs) {
                let nx = node.x + d.x, ny = node.y + d.y;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] !== 1) {
                    res.push({x: nx, y: ny});
                }
            }
            return res;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        function setUIDisabled(state) {
            isRunning = state;
            document.getElementById('btnLaunch').disabled = state;
            document.getElementById('btnGenerate').disabled = state;
            document.getElementById('btnClear').disabled = state;
            document.getElementById('algoSelector').disabled = state;
        }

        async function launchAI() {
            if (isRunning) return;
            setUIDisabled(true);
            resetAIStats();

            const algo = document.getElementById('algoSelector').value;
            if (algo === 'astar') await solveAStar(false);
            else if (algo === 'dijkstra') await solveAStar(true);
            else if (algo === 'bfs') await solveBFS();
            else if (algo === 'dfs') await solveDFS();

            setUIDisabled(false);
        }

        function tracePath(endInstance) {
            let curr = endInstance;
            while(curr !== null) {
                finalPath.unshift(curr);
                curr = curr.parent;
            }
            document.getElementById('stat-path').innerText = finalPath.length;
            render();
        }

        async function solveAStar(isDijkstra) {
            let openSet = [{...startNode, g: 0, f: 0, parent: null}];
            let closedSet = new Set();
            let h = (n) => isDijkstra ? 0 : Math.abs(n.x - endNode.x) + Math.abs(n.y - endNode.y);

            openSet[0].f = h(startNode);

            while(openSet.length > 0) {
                openSet.sort((a,b) => a.f - b.f);
                let current = openSet.shift();
                
                if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }

                closedSet.add(`${current.x},${current.y}`);
                visitedArr.push(current);

                for(let neighbor of getValidNeighbors(current)) {
                    if(closedSet.has(`${neighbor.x},${neighbor.y}`)) continue;
                    let tentG = current.g + 1;
                    let existing = openSet.find(o => o.x === neighbor.x && o.y === neighbor.y);

                    if(!existing) {
                        openSet.push({x: neighbor.x, y: neighbor.y, g: tentG, f: tentG + h(neighbor), parent: current});
                    } else if(tentG < existing.g) {
                        existing.g = tentG; existing.f = tentG + h(existing); existing.parent = current;
                    }
                }
                frontierArr = openSet.map(o => ({x: o.x, y: o.y}));
                document.getElementById('stat-visited').innerText = visitedArr.length;
                render();
                await sleep(aiDelay); // Динамическая скорость
            }
        }

        async function solveBFS() {
            let queue = [{...startNode, parent: null}];
            let visited = new Set([`${startNode.x},${startNode.y}`]);

            while(queue.length > 0) {
                let current = queue.shift();
                if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }
                
                visitedArr.push(current);

                for(let neighbor of getValidNeighbors(current)) {
                    let key = `${neighbor.x},${neighbor.y}`;
                    if(!visited.has(key)) {
                        visited.add(key);
                        queue.push({...neighbor, parent: current});
                    }
                }
                frontierArr = [...queue];
                document.getElementById('stat-visited').innerText = visitedArr.length;
                render();
                await sleep(aiDelay);
            }
        }

        async function solveDFS() {
            let stack = [{...startNode, parent: null}];
            let visited = new Set();

            while(stack.length > 0) {
                let current = stack.pop();
                let key = `${current.x},${current.y}`;

                if(visited.has(key)) continue;
                visited.add(key);
                visitedArr.push(current);

                if(current.x === endNode.x && current.y === endNode.y) { tracePath(current); return; }

                for(let neighbor of getValidNeighbors(current)) {
                    if(!visited.has(`${neighbor.x},${neighbor.y}`)) {
                        stack.push({...neighbor, parent: current});
                    }
                }
                frontierArr = [...stack];
                document.getElementById('stat-visited').innerText = visitedArr.length;
                render();
                await sleep(aiDelay);
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', init);
    </script>
</body>
</html>

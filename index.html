<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Maze Mind — Симулятор ИИ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --wall: #334155;
            --thinking: rgba(139, 92, 246, 0.4);
            --frontier: rgba(34, 211, 238, 0.6);
            --path: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-card);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 10;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .stats span strong {
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: calc(100vh - 120px);
        }

        @media (min-width: 768px) {
            main {
                flex-direction: row;
            }
        }

        .canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
        }

        canvas {
            background: #020617;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1 / 1;
            cursor: crosshair;
        }

        .controls {
            background: var(--bg-card);
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        @media (min-width: 768px) {
            .controls {
                width: 320px;
                grid-template-columns: 1fr;
                border-top: none;
                border-left: 1px solid rgba(255,255,255,0.05);
                padding: 24px;
                align-content: start;
                gap: 16px;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            grid-column: span 2;
        }

        @media (min-width: 768px) {
            .control-group { grid-column: span 1; }
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        select, button {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid #334155;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            width: 100%;
            font-weight: 500;
        }

        select:focus, button:hover:not(:disabled) {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        button.primary {
            background: var(--accent);
            border-color: transparent;
            color: white;
            grid-column: span 2;
        }

        @media (min-width: 768px) {
            button.primary { grid-column: span 1; }
        }

        button.primary:hover:not(:disabled) {
            background: #2563eb;
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .toggle-container {
            display: flex;
            background: #0f172a;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            padding: 6px;
            font-size: 0.8rem;
            flex: 1;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Maze Mind</h1>
        <div class="stats">
            <span>Шаги: <strong id="stat-steps">0</strong></span>
            <span>Путь: <strong id="stat-path">0</strong></span>
        </div>
    </header>

    <main>
        <div class="canvas-container">
            <canvas id="mazeCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Алгоритм ИИ</label>
                <select id="algoSelect">
                    <option value="astar">A* Search (Оптимальный)</option>
                    <option value="bfs">BFS (Поиск в ширину)</option>
                    <option value="dfs">DFS (Поиск в глубину)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Режим касания / мыши</label>
                <div class="toggle-container">
                    <button class="toggle-btn active" id="modeDraw">Стена</button>
                    <button class="toggle-btn" id="modeErase">Стереть</button>
                </div>
            </div>

            <button id="btnGen" type="button">Сгенерировать лабиринт</button>
            <button id="btnClear" type="button">Очистить</button>
            <button id="btnStart" class="primary" type="button">Запустить ИИ</button>
        </div>
    </main>

    <script>
        // Регистрация Service Worker для PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        
        // Настройки сетки (нечетные числа идеальны для генераторов лабиринтов)
        const COLS = 25;
        const ROWS = 25;
        let cellSize = 0;
        
        // Состояния ячеек
        const EMPTY = 0;
        const WALL = 1;
        
        let grid = Array(COLS).fill().map(() => Array(ROWS).fill(EMPTY));
        
        // Начальная и конечная точки
        const startNode = {x: 1, y: 1};
        const endNode = {x: COLS - 2, y: ROWS - 2};
        
        let isDrawing = false;
        let drawMode = WALL; // WALL или EMPTY
        let isRunning = false;
        
        // Массивы визуализации ИИ
        let visitedVisual = []; 
        let frontierVisual = [];
        let finalPath = [];

        // Инициализация размеров
        function resizeCanvas() {
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, container.clientHeight, 600) - 32;
            canvas.width = size;
            canvas.height = size;
            cellSize = size / COLS;
            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 50);

        // Рендеринг сцены
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Отрисовка базовой сетки / стен
            for(let x=0; x<COLS; x++) {
                for(let y=0; y<ROWS; y++) {
                    if(grid[x][y] === WALL) {
                        ctx.fillStyle = '#334155';
                        ctx.fillRect(x*cellSize, y*cellSize, cellSize+0.5, cellSize+0.5);
                    }
                }
            }

            // Отрисовка "размышлений" ИИ (просмотренные клетки)
            ctx.fillStyle = 'rgba(139, 92, 246, 0.25)';
            for(let node of visitedVisual) {
                ctx.fillRect(node.x*cellSize, node.y*cellSize, cellSize, cellSize);
            }

            // Отрисовка текущего фронтира (границы поиска)
            ctx.fillStyle = 'rgba(34, 211, 238, 0.5)';
            for(let node of frontierVisual) {
                ctx.fillRect(node.x*cellSize, node.y*cellSize, cellSize, cellSize);
            }

            // Отрисовка финального пути
            if(finalPath.length > 0) {
                ctx.strokeStyle = '#10b981';
                ctx.lineWidth = cellSize * 0.4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(startNode.x*cellSize + cellSize/2, startNode.y*cellSize + cellSize/2);
                for(let node of finalPath) {
                    ctx.lineTo(node.x*cellSize + cellSize/2, node.y*cellSize + cellSize/2);
                }
                ctx.stroke();
            }

            // Старт и Финиш
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath(); ctx.arc(startNode.x*cellSize+cellSize/2, startNode.y*cellSize+cellSize/2, cellSize*0.35, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(endNode.x*cellSize+cellSize/2, endNode.y*cellSize+cellSize/2, cellSize*0.35, 0, Math.PI*2); ctx.fill();
        }

        // Логика взаимодействия (мышь и тач)
        function handlePointer(e) {
            if(isRunning) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = Math.floor((clientX - rect.left) / cellSize);
            const y = Math.floor((clientY - rect.top) / cellSize);

            if(x >= 0 && x < COLS && y >= 0 && y < ROWS) {
                if((x === startNode.x && y === startNode.y) || (x === endNode.x && y === endNode.y)) return;
                grid[x][y] = drawMode;
                draw();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handlePointer(e); });
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) handlePointer(e); });
        window.addEventListener('mouseup', () => isDrawing = false);

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; handlePointer(e); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { if(isDrawing) handlePointer(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', () => isDrawing = false);

        // Переключатели режимов
        document.getElementById('modeDraw').addEventListener('click', function() {
            drawMode = WALL; this.classList.add('active'); document.getElementById('modeErase').classList.remove('active');
        });
        document.getElementById('modeErase').addEventListener('click', function() {
            drawMode = EMPTY; this.classList.add('active'); document.getElementById('modeDraw').classList.remove('active');
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            if(isRunning) return;
            grid = Array(COLS).fill().map(() => Array(ROWS).fill(EMPTY));
            resetAI();
        });

        function resetAI() {
            visitedVisual = []; frontierVisual = []; finalPath = [];
            document.getElementById('stat-steps').innerText = '0';
            document.getElementById('stat-path').innerText = '0';
            draw();
        }

        // Генератор идеального лабиринта (Recursive Backtracker)
        document.getElementById('btnGen').addEventListener('click', () => {
            if(isRunning) return;
            resetAI();
            
            // Заполняем всё стенами
            for(let x=0; x<COLS; x++) for(let y=0; y<ROWS; y++) grid[x][y] = WALL;

            let stack = [];
            let current = {x: 1, y: 1};
            grid[current.x][current.y] = EMPTY;

            function getNeighbors(cell) {
                let neighbors = [];
                let dirs = [{x:0, y:-2}, {x:0, y:2}, {x:-2, y:0}, {x:2, y:0}];
                for(let d of dirs) {
                    let nx = cell.x + d.x;
                    let ny = cell.y + d.y;
                    if(nx > 0 && nx < COLS-1 && ny > 0 && ny < ROWS-1 && grid[nx][ny] === WALL) {
                        neighbors.push({x: nx, y: ny, wallX: cell.x + d.x/2, wallY: cell.y + d.y/2});
                    }
                }
                return neighbors;
            }

            // Быстрая синхронная генерация структуры
            while(true) {
                let neighbors = getNeighbors(current);
                if(neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    grid[next.wallX][next.wallY] = EMPTY;
                    grid[next.x][next.y] = EMPTY;
                    stack.push(current);
                    current = next;
                } else if(stack.length > 0) {
                    current = stack.pop();
                } else {
                    break;
                }
            }
            grid[startNode.x][startNode.y] = EMPTY;
            grid[endNode.x][endNode.y] = EMPTY;
            draw();
        });

        // ИИ — Движок поиска пути
        document.getElementById('btnStart').addEventListener('click', async () => {
            if(isRunning) return;
            isRunning = true;
            resetAI();
            toggleControls(true);

            const algo = document.getElementById('algoSelect').value;
            
            if(algo === 'bfs') await solveBFS();
            else if(algo === 'dfs') await solveDFS();
            else if(algo === 'astar') await solveAStar();

            isRunning = false;
            toggleControls(false);
        });

        function toggleControls(disabled) {
            document.getElementById('btnStart').disabled = disabled;
            document.getElementById('btnGen').disabled = disabled;
            document.getElementById('btnClear').disabled = disabled;
            document.getElementById('algoSelect').disabled = disabled;
        }

        const sleep = (ms) => new Promise(res => setTimeout(res, ms));

        function getValidNeighbors(node) {
            let res = [];
            let dirs = [{x:0,y:-1}, {x:1,y:0}, {x:0,y:1}, {x:-1,y:0}];
            for(let d of dirs) {
                let nx = node.x + d.x;
                let ny = node.y + d.y;
                if(nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && grid[nx][ny] !== WALL) {
                    res.push({x: nx, y: ny});
                }
            }
            return res;
        }

        // Реализация алгоритма A*
        async function solveAStar() {
            let openSet = [{...startNode, g: 0, f: h(startNode), parent: null}];
            let closedSet = new Set();

            function h(node) {
                return Math.abs(node.x - endNode.x) + Math.abs(node.y - endNode.y); // Манхэттенское расстояние
            }

            while(openSet.length > 0) {
                openSet.sort((a,b) => a.f - b.f);
                let current = openSet.shift();
                
                if(current.x === endNode.x && current.y === endNode.y) {
                    reconstructPath(current);
                    return;
                }

                let key = `${current.x},${current.y}`;
                closedSet.add(key);
                visitedVisual.push(current);

                for(let neighbor of getValidNeighbors(current)) {
                    if(closedSet.has(`${neighbor.x},${neighbor.y}`)) continue;
                    
                    let tentativeG = current.g + 1;
                    let existing = openSet.find(o => o.x === neighbor.x && o.y === neighbor.y);

                    if(!existing) {
                        let nNode = {
                            x: neighbor.x, y: neighbor.y, 
                            g: tentativeG, f: tentativeG + h(neighbor), 
                            parent: current
                        };
                        openSet.push(nNode);
                    } else if(tentativeG < existing.g) {
                        existing.g = tentativeG;
                        existing.f = tentativeG + h(existing);
                        existing.parent = current;
                    }
                }

                frontierVisual = openSet.map(o => ({x: o.x, y: o.y}));
                document.getElementById('stat-steps').innerText = visitedVisual.length;
                draw();
                await sleep(15);
            }
        }

        // Реализация BFS
        async function solveBFS() {
            let queue = [{...startNode, parent: null}];
            let visited = new Set([`${startNode.x},${startNode.y}`]);

            while(queue.length > 0) {
                let current = queue.shift();

                if(current.x === endNode.x && current.y === endNode.y) {
                    reconstructPath(current);
                    return;
                }

                visitedVisual.push(current);

                for(let neighbor of getValidNeighbors(current)) {
                    let key = `${neighbor.x},${neighbor.y}`;
                    if(!visited.has(key)) {
                        visited.add(key);
                        queue.push({...neighbor, parent: current});
                    }
                }

                frontierVisual = [...queue];
                document.getElementById('stat-steps').innerText = visitedVisual.length;
                draw();
                await sleep(10);
            }
        }

        // Реализация DFS
        async function solveDFS() {
            let stack = [{...startNode, parent: null}];
            let visited = new Set();

            while(stack.length > 0) {
                let current = stack.pop();
                let key = `${current.x},${current.y}`;

                if(visited.has(key)) continue;
                visited.add(key);
                visitedVisual.push(current);

                if(current.x === endNode.x && current.y === endNode.y) {
                    reconstructPath(current);
                    return;
                }

                for(let neighbor of getValidNeighbors(current)) {
                    if(!visited.has(`${neighbor.x},${neighbor.y}`)) {
                        stack.push({...neighbor, parent: current});
                    }
                }

                frontierVisual = [...stack];
                document.getElementById('stat-steps').innerText = visitedVisual.length;
                draw();
                await sleep(25); // Задержка чуть выше, так как DFS идет по одной ветке
            }
        }

        function reconstructPath(endNodeInstance) {
            let curr = endNodeInstance;
            while(curr !== null) {
                finalPath.unshift(curr);
                curr = curr.parent;
            }
            document.getElementById('stat-path').innerText = finalPath.length;
            draw();
        }
    </script>
</body>
</html>
